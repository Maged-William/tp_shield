#
# Trackpoint Shield - User Config
#

# USB logging for debugging
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_LOGGING_MINIMAL=Y

CONFIG_PS2_LOG_LEVEL_DBG=n
CONFIG_UART_LOG_LEVEL_DBG=n

# Deferred logging to keep USB output off the time-critical interrupt path.
# CONFIG_LOG_MODE_IMMEDIATE is not set

#
# PS/2 Trackpoint Driver - Stream-Only Mode
#
# Enables the hack that skips all PS/2 init handshakes.
# The trackpoint IC streams motion packets immediately on power-up
# and rejects all host commands (0xFF, 0xF4, 0xF3, etc).
# RST pin floats.
CONFIG_ZMK_INPUT_MOUSE_PS2_STREAM_ONLY=y

# Catch corrupted packets before they generate bogus mouse jumps
CONFIG_ZMK_INPUT_MOUSE_PS2_ENABLE_ERROR_MITIGATION=y
